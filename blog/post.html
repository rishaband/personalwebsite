<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/website-styles/experience-layout.css" />
  <link rel="stylesheet" href="/css/website-styles/blog.css" />
  <link rel="icon" type="image/png" href="/f-sig.png" />
</head>
<body>
  <div class="experience-shell blog-post-shell">
    <main class="article-content">
      <a class="toc-back" href="/index.html#blog">&larr; back</a>

      <header class="article-header">
        <h1 id="post-title">loading…</h1>
        <p class="article-meta" id="post-meta"></p>
        <img id="post-hero" class="hero-image" alt="" hidden />
      </header>

      <div id="article-body" class="article-body narrative-flow"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/js/experience-layout.js"></script>
  <script src="/js/blog.js"></script>
  <script>
    document.addEventListener("click", function (e) {
      var link = e.target.closest('a[href="#"]');
      if (!link) return;
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
